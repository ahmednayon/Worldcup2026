<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 Predictor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    button { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1a2840; border-radius: 99px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback } = React;

    // ── DATA ──────────────────────────────────────────────────────────────
    const GROUPS_DATA = {
      A: { teams: [{ name: "Mexico", flag: "🇲🇽" }, { name: "South Africa", flag: "🇿🇦" }, { name: "South Korea", flag: "🇰🇷" }, { name: "Czechia", flag: "🇨🇿" }] },
      B: { teams: [{ name: "Canada", flag: "🇨🇦" }, { name: "Bosnia & Herz.", flag: "🇧🇦" }, { name: "Qatar", flag: "🇶🇦" }, { name: "Switzerland", flag: "🇨🇭" }] },
      C: { teams: [{ name: "Brazil", flag: "🇧🇷" }, { name: "Morocco", flag: "🇲🇦" }, { name: "Haiti", flag: "🇭🇹" }, { name: "Scotland", flag: "🏴" }] },
      D: { teams: [{ name: "USA", flag: "🇺🇸" }, { name: "Paraguay", flag: "🇵🇾" }, { name: "Australia", flag: "🇦🇺" }, { name: "Türkiye", flag: "🇹🇷" }] },
      E: { teams: [{ name: "Germany", flag: "🇩🇪" }, { name: "Curazao", flag: "🇨🇼" }, { name: "Cote d'Ivoire", flag: "🇨🇮" }, { name: "Ecuador", flag: "🇪🇨" }] },
      F: { teams: [{ name: "Netherlands", flag: "🇳🇱" }, { name: "Japan", flag: "🇯🇵" }, { name: "Sweden", flag: "🇸🇪" }, { name: "Tunisia", flag: "🇹🇳" }] },
      G: { teams: [{ name: "Belgium", flag: "🇧🇪" }, { name: "Egypt", flag: "🇪🇬" }, { name: "IR Iran", flag: "🇮🇷" }, { name: "New Zealand", flag: "🇳🇿" }] },
      H: { teams: [{ name: "Spain", flag: "🇪🇸" }, { name: "Cabo Verde", flag: "🇨🇻" }, { name: "Saudi Arabia", flag: "🇸🇦" }, { name: "Uruguay", flag: "🇺🇾" }] },
      I: { teams: [{ name: "France", flag: "🇫🇷" }, { name: "Senegal", flag: "🇸🇳" }, { name: "Iraq", flag: "🇮🇶" }, { name: "Norway", flag: "🇳🇴" }] },
      J: { teams: [{ name: "Argentina", flag: "🇦🇷" }, { name: "Algeria", flag: "🇩🇿" }, { name: "Austria", flag: "🇦🇹" }, { name: "Jordan", flag: "🇯🇴" }] },
      K: { teams: [{ name: "Portugal", flag: "🇵🇹" }, { name: "DR Congo", flag: "🇨🇩" }, { name: "Uzbekistan", flag: "🇺🇿" }, { name: "Colombia", flag: "🇨🇴" }] },
      L: { teams: [{ name: "England", flag: "🏴" }, { name: "Croatia", flag: "🇭🇷" }, { name: "Ghana", flag: "🇬🇭" }, { name: "Panama", flag: "🇵🇦" }] },
    };

    const dc = (o) => JSON.parse(JSON.stringify(o));

    const makeMatches = (teams) => {
      const schedule = [[0,1],[2,3],[3,1],[0,2],[3,0],[1,2]];
      return schedule.map(([h, a]) => ({ home: teams[h].name, away: teams[a].name, result: null }));
    };

    const FRESH_GROUPS = Object.fromEntries(
      Object.entries(GROUPS_DATA).map(([g, { teams }]) => [g, { teams, matches: makeMatches(teams) }])
    );

    const calcStandings = (teams, matches) => {
      const s = Object.fromEntries(teams.map(t => [t.name, { ...t, P:0, W:0, D:0, L:0, Pts:0 }]));
      matches.forEach(({ home, away, result }) => {
        if (!result) return;
        s[home].P++; s[away].P++;
        if (result === "home")      { s[home].W++; s[home].Pts += 3; s[away].L++; }
        else if (result === "away") { s[away].W++; s[away].Pts += 3; s[home].L++; }
        else                        { s[home].D++; s[home].Pts++; s[away].D++; s[away].Pts++; }
      });
      return Object.values(s).sort((a, b) => b.Pts - a.Pts || b.W - a.W);
    };

    // ── BRACKET LOGIC ─────────────────────────────────────────────────────
    const ROUNDS = ["r32","r16","qf","sf","final"];
    const ROUND_SIZES = { r32:16, r16:8, qf:4, sf:2, final:1 };
    const ROUND_LABELS = { r32:"Round of 32", r16:"Round of 16", qf:"Quarter-Finals", sf:"Semi-Finals", final:"Final ⚽" };
    const R32_LABELS = [
      "A1 vs B2","B1 vs A2","C1 vs D2","D1 vs C2",
      "E1 vs F2","F1 vs E2","G1 vs H2","H1 vs G2",
      "I1 vs J2","J1 vs I2","K1 vs L2","L1 vs K2",
      "3rd","3rd","3rd","3rd",
    ];

    const freshBracket = () =>
      Object.fromEntries(ROUNDS.map(r => [r,
        Array.from({ length: ROUND_SIZES[r] }, (_, i) => ({ id:`${r}_${i}`, home:null, away:null, winner:null }))
      ]));

    function getBest3rds(groups) {
      return Object.keys(groups)
        .map(k => { const st = calcStandings(groups[k].teams, groups[k].matches); return st[2] ? { ...st[2], group: k } : null; })
        .filter(Boolean)
        .sort((a,b) => b.Pts - a.Pts || b.W - a.W)
        .slice(0, 8);
    }

    function buildBracket(groups) {
      const q = Object.keys(groups).map(k => {
        const st = calcStandings(groups[k].teams, groups[k].matches);
        return { first: st[0] || null, second: st[1] || null };
      });
      const b3 = getBest3rds(groups);
      while (b3.length < 8) b3.push(null);

      const pairs = [
        [q[0].first, q[1].second],  [q[1].first, q[0].second],
        [q[2].first, q[3].second],  [q[3].first, q[2].second],
        [q[4].first, q[5].second],  [q[5].first, q[4].second],
        [q[6].first, q[7].second],  [q[7].first, q[6].second],
        [q[8].first, q[9].second],  [q[9].first, q[8].second],
        [q[10].first, q[11].second],[q[11].first, q[10].second],
        [b3[0], b3[1]], [b3[2], b3[3]], [b3[4], b3[5]], [b3[6], b3[7]],
      ];
      const b = freshBracket();
      b.r32 = b.r32.map((m, i) => ({ ...m, home: pairs[i][0]||null, away: pairs[i][1]||null, winner: null }));
      return b;
    }

    function clearDownstream(b, round, idx, teamName) {
      const ri = ROUNDS.indexOf(round);
      if (ri < 0 || !b[round] || !b[round][idx]) return;
      const match = b[round][idx];
      if (match.home?.name === teamName) match.home = null;
      if (match.away?.name === teamName) match.away = null;
      if (match.winner?.name === teamName) {
        match.winner = null;
        if (ri < ROUNDS.length - 1) clearDownstream(b, ROUNDS[ri+1], Math.floor(idx/2), teamName);
      }
    }

    function advanceBracket(bracket, round, idx, team) {
      const b = dc(bracket);
      const match = b[round][idx];
      const prev = match.winner;
      const ri = ROUNDS.indexOf(round);
      const hasNext = ri < ROUNDS.length - 1;
      const nextRound = hasNext ? ROUNDS[ri+1] : null;
      const nextIdx = Math.floor(idx / 2);
      const isHome = idx % 2 === 0;

      if (prev?.name === team.name) {
        match.winner = null;
        if (hasNext) {
          const nm = b[nextRound][nextIdx];
          if (isHome && nm.home?.name === team.name) nm.home = null;
          if (!isHome && nm.away?.name === team.name) nm.away = null;
          clearDownstream(b, nextRound, nextIdx, team.name);
        }
        return b;
      }

      if (prev && hasNext) {
        const nm = b[nextRound][nextIdx];
        if (nm.home?.name === prev.name) nm.home = null;
        if (nm.away?.name === prev.name) nm.away = null;
        clearDownstream(b, nextRound, nextIdx, prev.name);
      }

      match.winner = team;

      if (hasNext) {
        const nm = b[nextRound][nextIdx];
        if (isHome) {
          if (nm.home && nm.home.name !== team.name) { clearDownstream(b, nextRound, nextIdx, nm.home.name); b[nextRound][nextIdx].home = null; }
          b[nextRound][nextIdx].home = team;
        } else {
          if (nm.away && nm.away.name !== team.name) { clearDownstream(b, nextRound, nextIdx, nm.away.name); b[nextRound][nextIdx].away = null; }
          b[nextRound][nextIdx].away = team;
        }
        if (b[nextRound][nextIdx].winner) {
          const sw = b[nextRound][nextIdx].winner;
          b[nextRound][nextIdx].winner = null;
          if (ri + 1 < ROUNDS.length - 1) clearDownstream(b, ROUNDS[ri+2], Math.floor(nextIdx/2), sw.name);
        }
      }
      return b;
    }

    const rndResult = () => { const r = Math.random(); return r < 0.45 ? "home" : r < 0.75 ? "away" : "draw"; };

    // ── COMPONENTS ────────────────────────────────────────────────────────

    function Standings({ standings, dark }) {
      return (
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11 }}>
          <thead>
            <tr style={{ color: dark ? "#4a5568" : "#94a3b8" }}>
              <th style={{ textAlign:"left", paddingBottom:4, paddingLeft:4, width:18 }}>#</th>
              <th style={{ textAlign:"left", paddingBottom:4 }}>Team</th>
              <th style={{ paddingBottom:4, textAlign:"center", width:22 }}>P</th>
              <th style={{ paddingBottom:4, textAlign:"center", width:22 }}>W</th>
              <th style={{ paddingBottom:4, textAlign:"center", width:22 }}>D</th>
              <th style={{ paddingBottom:4, textAlign:"center", width:22 }}>L</th>
              <th style={{ paddingBottom:4, textAlign:"center", width:30, color:"#f59e0b", fontWeight:900 }}>Pts</th>
            </tr>
          </thead>
          <tbody>
            {standings.map((t, i) => (
              <tr key={t.name} style={{ opacity: i < 2 ? 1 : i === 2 ? 0.6 : 0.28 }}>
                <td style={{ paddingTop:2, paddingBottom:2, paddingLeft:4 }}>
                  <span style={{
                    display:"inline-flex", alignItems:"center", justifyContent:"center",
                    width:16, height:16, borderRadius:4, fontSize:9, fontWeight:900,
                    background: i===0 ? "linear-gradient(135deg,#f59e0b,#eab308)" : i===1 ? (dark?"#1e293b":"#e2e8f0") : i===2 ? (dark?"#162032":"#f1f5f9") : "transparent",
                    color: i===0 ? "#000" : i===1 ? (dark?"#94a3b8":"#64748b") : dark?"#374151":"#cbd5e1",
                  }}>{i+1}</span>
                </td>
                <td style={{ paddingTop:2, paddingBottom:2 }}>
                  <span style={{ display:"flex", alignItems:"center", gap:4 }}>
                    <span>{t.flag}</span>
                    <span style={{ color:dark?"#e2e8f0":"#475569", fontWeight:600, maxWidth:90, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{t.name}</span>
                  </span>
                </td>
                <td style={{ textAlign:"center", color:dark?"#4b5563":"#94a3b8" }}>{t.P}</td>
                <td style={{ textAlign:"center", color:dark?"#4b5563":"#94a3b8" }}>{t.W}</td>
                <td style={{ textAlign:"center", color:dark?"#4b5563":"#94a3b8" }}>{t.D}</td>
                <td style={{ textAlign:"center", color:dark?"#4b5563":"#94a3b8" }}>{t.L}</td>
                <td style={{ textAlign:"center", color:"#f59e0b", fontWeight:900 }}>{t.Pts}</td>
              </tr>
            ))}
          </tbody>
        </table>
      );
    }

    function MatchRow({ match, teams, onResult, dark }) {
      const hTeam = teams.find(t => t.name === match.home);
      const aTeam = teams.find(t => t.name === match.away);
      const btn = (val, col) => {
        const active = match.result === val;
        const bg = col==="blue"?"#3b82f6":col==="gray"?"#6b7280":"#22c55e";
        const bd = col==="blue"?"#60a5fa":col==="gray"?"#9ca3af":"#4ade80";
        return {
          padding:"3px 9px", borderRadius:6, fontSize:11, fontWeight:900, cursor:"pointer", transition:"all 0.12s",
          border:`1px solid ${active ? bd : dark?"rgba(255,255,255,0.1)":"#e2e8f0"}`,
          background: active ? bg : dark?"rgba(255,255,255,0.04)":"#f8fafc",
          color: active ? "#fff" : dark?"#4b5563":"#94a3b8",
        };
      };
      return (
        <div style={{ display:"flex", alignItems:"center", gap:5, padding:"5px 4px", borderRadius:8 }}>
          <span style={{ flex:1, textAlign:"right", fontSize:11, fontWeight:600, color:dark?"#e2e8f0":"#475569", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
            {hTeam?.flag} {match.home}
          </span>
          <div style={{ display:"flex", gap:3, flexShrink:0 }}>
            <button style={btn("home","blue")}  onClick={() => onResult(match.result==="home"?null:"home")}>1</button>
            <button style={btn("draw","gray")}  onClick={() => onResult(match.result==="draw"?null:"draw")}>X</button>
            <button style={btn("away","green")} onClick={() => onResult(match.result==="away"?null:"away")}>2</button>
          </div>
          <span style={{ flex:1, fontSize:11, fontWeight:600, color:dark?"#e2e8f0":"#475569", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
            {match.away} {aTeam?.flag}
          </span>
        </div>
      );
    }

    function GroupCard({ gid, group, onResult, dark }) {
      const [open, setOpen] = useState(false);
      const standings = calcStandings(group.teams, group.matches);
      const done = group.matches.filter(m => m.result).length;
      const total = group.matches.length;
      const allDone = done === total;
      return (
        <div style={{ borderRadius:14, border:`1px solid ${dark?"#1a2840":"#e2e8f0"}`, background:dark?"#080e1c":"#fff", overflow:"hidden", boxShadow:dark?"none":"0 1px 4px rgba(0,0,0,0.06)" }}>
          <div onClick={() => setOpen(v=>!v)} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"11px 14px", cursor:"pointer", userSelect:"none" }}>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ fontSize:13, fontWeight:900, background:"linear-gradient(90deg,#f59e0b,#eab308)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>GROUP {gid}</span>
              <span style={{
                fontSize:10, padding:"2px 7px", borderRadius:99, fontWeight:700,
                background: allDone?"rgba(34,197,94,0.15)":dark?"rgba(255,255,255,0.05)":"#f1f5f9",
                color: allDone?"#22c55e":dark?"#4b5563":"#94a3b8",
                border:`1px solid ${allDone?"rgba(34,197,94,0.3)":dark?"rgba(255,255,255,0.08)":"#e2e8f0"}`,
              }}>{done}/{total}</span>
            </div>
            <span style={{ color:dark?"#374151":"#cbd5e1", fontSize:10, display:"inline-block", transition:"transform 0.2s", transform:open?"rotate(180deg)":"none" }}>▼</span>
          </div>
          <div style={{ padding:"0 14px 10px", borderTop:`1px solid ${dark?"#121e30":"#f1f5f9"}`, paddingTop:10 }}>
            <Standings standings={standings} dark={dark} />
          </div>
          <div style={{ overflow:"hidden", maxHeight:open?600:0, transition:"max-height 0.25s ease" }}>
            <div style={{ margin:"0 10px 10px", paddingTop:8, borderTop:`1px solid ${dark?"#121e30":"#f1f5f9"}` }}>
              <p style={{ fontSize:9, letterSpacing:"0.2em", textTransform:"uppercase", fontWeight:900, color:dark?"#374151":"#cbd5e1", marginBottom:6 }}>MATCH RESULTS</p>
              {group.matches.map((m, i) => (
                <MatchRow key={i} match={m} teams={group.teams} onResult={r => onResult(gid, i, r)} dark={dark} />
              ))}
            </div>
          </div>
        </div>
      );
    }

    function TeamSlot({ team, match, onWinner, dark, isFinal }) {
      const isWinner = match.winner?.name === team?.name;
      const isLoser  = match.winner && match.winner?.name !== team?.name;
      const canClick = !!(match.home && match.away);
      if (!team) return (
        <div style={{ display:"flex", alignItems:"center", gap:6, padding:isFinal?"9px 12px":"7px 10px", fontSize:11, color:dark?"#2d3f57":"#cbd5e1", minHeight:isFinal?38:32 }}>
          <span style={{ opacity:0.3 }}>□</span> <span style={{ fontStyle:"italic" }}>TBD</span>
        </div>
      );
      return (
        <button onClick={() => canClick && onWinner(team)} disabled={!canClick} style={{
          width:"100%", display:"flex", alignItems:"center", gap:7,
          padding:isFinal?"9px 12px":"7px 10px", textAlign:"left", border:"none",
          background: isWinner ? (dark?"linear-gradient(90deg,rgba(245,166,35,0.25),rgba(234,179,8,0.1))":"linear-gradient(90deg,rgba(245,166,35,0.18),rgba(234,179,8,0.06))") : "transparent",
          opacity: isLoser ? 0.22 : !canClick ? 0.5 : 1,
          cursor: canClick ? "pointer" : "default",
          transition:"all 0.15s",
          minHeight: isFinal ? 38 : 32,
        }}>
          <span style={{ fontSize:isFinal?18:14, flexShrink:0 }}>{team.flag}</span>
          <span style={{ fontWeight:isWinner?800:600, flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", fontSize:isFinal?13:11, color:isWinner?"#fbbf24":dark?"#cbd5e1":"#374151" }}>{team.name}</span>
          {isWinner && <span style={{ color:"#f59e0b", fontSize:10, flexShrink:0 }}>✓</span>}
        </button>
      );
    }

    function BracketCard({ match, onWinner, dark, isFinal, matchLabel }) {
      const w = isFinal ? 200 : 172;
      return (
        <div style={{ display:"flex", flexDirection:"column", width:w, minWidth:w, background:dark?"#0a1628":"#f8fafc", borderRadius:10, border:`1px solid ${dark?"#1a2840":"#e2e8f0"}`, overflow:"hidden", boxShadow:dark?"0 2px 8px rgba(0,0,0,0.3)":"0 1px 4px rgba(0,0,0,0.08)" }}>
          {matchLabel && (
            <div style={{ fontSize:8, fontWeight:700, letterSpacing:"0.15em", textTransform:"uppercase", color:dark?"#2d4a6e":"#94a3b8", padding:"3px 10px 2px", background:dark?"#060e1c":"#f1f5f9", borderBottom:`1px solid ${dark?"#0f1e35":"#e2e8f0"}` }}>{matchLabel}</div>
          )}
          <TeamSlot team={match.home} match={match} onWinner={onWinner} dark={dark} isFinal={isFinal} />
          <div style={{ textAlign:"center", fontSize:8, fontWeight:900, letterSpacing:"0.18em", color:dark?"#1e3a5f":"#cbd5e1", background:dark?"#060e1c":"#f1f5f9", padding:"2px 0", borderTop:`1px solid ${dark?"#0f1e35":"#e2e8f0"}`, borderBottom:`1px solid ${dark?"#0f1e35":"#e2e8f0"}` }}>VS</div>
          <TeamSlot team={match.away} match={match} onWinner={onWinner} dark={dark} isFinal={isFinal} />
        </div>
      );
    }

    function BracketView({ bracket, onAdvance, dark }) {
      const gapMap = { r32:6, r16:22, qf:66, sf:150, final:0 };
      const cardH = 82;
      return (
        <div style={{ overflowX:"auto", paddingBottom:20 }}>
          <div style={{ display:"flex", alignItems:"flex-start", gap:8, minWidth:"max-content", padding:"4px" }}>
            {ROUNDS.map((round, ri) => {
              const topPad = ri === 0 ? 0 : Math.pow(2, ri) * (cardH + gapMap[ROUNDS[ri-1]]) / 2 - (cardH / 2);
              return (
                <div key={round} style={{ display:"flex", flexDirection:"column", alignItems:"center" }}>
                  <div style={{ textAlign:"center", fontSize:8, textTransform:"uppercase", letterSpacing:"0.18em", fontWeight:900, marginBottom:8, paddingBottom:5, width:"100%", borderBottom:`1px solid ${dark?"#1a2840":"#f1f5f9"}`, color:dark?"#4b5563":"#94a3b8" }}>
                    {ROUND_LABELS[round]}
                  </div>
                  <div style={{ display:"flex", flexDirection:"column", gap:gapMap[round], paddingTop:topPad }}>
                    {bracket[round].map((m, i) => (
                      <BracketCard key={m.id} match={m} onWinner={team => onAdvance(round, i, team)} dark={dark} isFinal={round==="final"} matchLabel={round==="r32"?R32_LABELS[i]:null} />
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function ChampionBanner({ champion, dark }) {
      if (!champion) return null;
      return (
        <div style={{ borderRadius:18, marginBottom:20, padding:"28px 24px", textAlign:"center", border:"1px solid rgba(245,166,35,0.35)", background:"linear-gradient(135deg,rgba(245,166,35,0.12),rgba(234,179,8,0.05))" }}>
          <div style={{ fontSize:52, marginBottom:8 }}>🏆</div>
          <p style={{ color:"#f59e0b", fontSize:9, letterSpacing:"0.3em", fontWeight:900, marginBottom:8, textTransform:"uppercase" }}>FIFA World Cup 2026 Champion</p>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:12 }}>
            <span style={{ fontSize:44 }}>{champion.flag}</span>
            <span style={{ fontSize:28, fontWeight:900, color:dark?"#fff":"#1e293b" }}>{champion.name}</span>
          </div>
          <p style={{ marginTop:8, fontSize:12, color:dark?"#4b5563":"#94a3b8" }}>🎉 Your predicted champion!</p>
        </div>
      );
    }

    function NavTabs({ active, onChange, dark }) {
      return (
        <div style={{ display:"flex", borderRadius:10, padding:3, gap:3, background:dark?"#060c1a":"#f1f5f9", border:`1px solid ${dark?"#1a2840":"#e2e8f0"}` }}>
          {[{id:"groups",label:"⊞ Groups"},{id:"bracket",label:"🏆 Bracket"}].map(t => (
            <button key={t.id} onClick={() => onChange(t.id)} style={{
              flex:1, padding:"7px 14px", borderRadius:7, fontSize:12, fontWeight:900, border:"none", cursor:"pointer", transition:"all 0.18s",
              background: active===t.id ? "linear-gradient(90deg,#f59e0b,#eab308)" : "transparent",
              color: active===t.id ? "#000" : dark?"#6b7280":"#64748b",
              boxShadow: active===t.id ? "0 2px 8px rgba(245,158,11,0.35)" : "none",
            }}>{t.label}</button>
          ))}
        </div>
      );
    }

    // ── MAIN APP ──────────────────────────────────────────────────────────
    function App() {
      const [dark, setDark] = useState(true);
      const [tab, setTab] = useState("groups");
      const [groups, setGroups] = useState(() => dc(FRESH_GROUPS));
      const [bracket, setBracket] = useState(() => freshBracket());

      const setResult = useCallback((gid, mi, result) => {
        setGroups(prev => { const u = dc(prev); u[gid].matches[mi].result = result; return u; });
      }, []);

      const genBracket = useCallback(() => {
        setBracket(buildBracket(groups));
        setTab("bracket");
      }, [groups]);

      const advance = useCallback((round, idx, team) => {
        setBracket(prev => advanceBracket(prev, round, idx, team));
      }, []);

      const randomize = useCallback(() => {
        setGroups(prev => { const u = dc(prev); Object.values(u).forEach(g => g.matches.forEach(m => { m.result = rndResult(); })); return u; });
      }, []);

      const reset = useCallback(() => {
        setGroups(dc(FRESH_GROUPS));
        setBracket(freshBracket());
        setTab("groups");
      }, []);

      const champion = bracket.final[0]?.winner ?? null;
      const predicted = Object.values(groups).reduce((s, g) => s + g.matches.filter(m => m.result).length, 0);
      const totalM = Object.values(groups).reduce((s, g) => s + g.matches.length, 0);
      const completedGroups = Object.values(groups).filter(g => g.matches.every(m => m.result)).length;

      const hdr = { background: dark?"rgba(4,8,16,0.92)":"rgba(238,242,255,0.95)", borderBottom:`1px solid ${dark?"#121e30":"#e2e8f0"}` };

      return (
        <div style={{ minHeight:"100vh", fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif", background:dark?"#040810":"#eef2ff", color:dark?"#fff":"#1e293b",
          backgroundImage: dark ? "radial-gradient(ellipse 70% 35% at 10% 5%,rgba(245,166,35,0.06) 0%,transparent 70%),radial-gradient(ellipse 50% 25% at 90% 90%,rgba(59,130,246,0.06) 0%,transparent 70%)" : "radial-gradient(ellipse 70% 35% at 10% 5%,rgba(245,166,35,0.1) 0%,transparent 70%)" }}>

          {/* HEADER */}
          <header style={{ position:"sticky", top:0, zIndex:40, backdropFilter:"blur(20px)", ...hdr }}>
            <div style={{ maxWidth:1280, margin:"0 auto", padding:"10px 14px", display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
                <div style={{ width:32, height:32, borderRadius:9, display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, background:dark?"linear-gradient(135deg,rgba(245,166,35,0.22),rgba(234,179,8,0.12))":"linear-gradient(135deg,#fef3c7,#fde68a)", border:`1px solid ${dark?"rgba(245,166,35,0.28)":"#fcd34d"}` }}>⚽</div>
                <div>
                  <div style={{ fontWeight:900, fontSize:13, lineHeight:1.2 }}>
                    <span style={{ background:"linear-gradient(90deg,#f59e0b,#eab308)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>WORLD CUP</span>
                    <span style={{ color:dark?"#fff":"#1e293b" }}> 2026</span>
                  </div>
                  <div style={{ fontSize:8, letterSpacing:"0.22em", textTransform:"uppercase", fontWeight:700, color:dark?"#374151":"#94a3b8" }}>Predictor</div>
                </div>
              </div>
              <div style={{ flex:1, display:"flex", justifyContent:"center", minWidth:200 }}>
                <div style={{ width:240 }}><NavTabs active={tab} onChange={setTab} dark={dark} /></div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
                {[
                  { label:"🎲", title:"Random", onClick:randomize, style:{ background:"rgba(59,130,246,0.1)", border:"1px solid rgba(59,130,246,0.22)", color:"#60a5fa" } },
                  { label:"⚡", title:"Bracket", onClick:genBracket, style:{ background:"linear-gradient(90deg,#f59e0b,#eab308)", border:"none", color:"#000" } },
                  { label:"↺", title:"Reset", onClick:reset, style:{ background:"rgba(239,68,68,0.1)", border:"1px solid rgba(239,68,68,0.22)", color:"#f87171" } },
                ].map(({ label, title, onClick, style:s }) => (
                  <button key={label} onClick={onClick} title={title} style={{ padding:"6px 12px", borderRadius:8, fontSize:13, fontWeight:700, cursor:"pointer", ...s }}>{label}</button>
                ))}
                <button onClick={() => setDark(d => !d)} style={{ padding:"5px 9px", borderRadius:8, fontSize:14, cursor:"pointer", background:dark?"rgba(255,255,255,0.05)":"#fff", border:`1px solid ${dark?"#1a2840":"#e2e8f0"}` }}>
                  {dark ? "☀️" : "🌙"}
                </button>
              </div>
            </div>
          </header>

          <main style={{ maxWidth:1280, margin:"0 auto", padding:"16px 14px" }}>

            {/* STATS BAR */}
            <div style={{ display:"flex", flexWrap:"wrap", alignItems:"center", gap:"10px 20px", marginBottom:16, padding:"12px 16px", borderRadius:14, background:dark?"#080e1c":"#fff", border:`1px solid ${dark?"#1a2840":"#e2e8f0"}` }}>
              {[
                { label:"Matches Predicted", val:predicted, max:totalM, color:"#f59e0b", grad:"linear-gradient(90deg,#f59e0b,#eab308)" },
                { label:"Groups Complete", val:completedGroups, max:12, color:"#22c55e", grad:"linear-gradient(90deg,#22c55e,#16a34a)" },
              ].map(({ label, val, max, color, grad }) => (
                <div key={label} style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <div>
                    <p style={{ fontSize:9, textTransform:"uppercase", letterSpacing:"0.2em", fontWeight:700, color:dark?"#374151":"#94a3b8", margin:0 }}>{label}</p>
                    <p style={{ fontWeight:900, fontSize:18, lineHeight:1.2, color, margin:0 }}>{val}<span style={{ fontWeight:400, fontSize:12, color:dark?"#374151":"#94a3b8" }}>/{max}</span></p>
                  </div>
                  <div style={{ width:50, height:5, borderRadius:99, background:dark?"rgba(255,255,255,0.06)":"#e2e8f0", overflow:"hidden" }}>
                    <div style={{ width:`${(val/max)*100}%`, height:"100%", borderRadius:99, background:grad, transition:"width 0.3s" }} />
                  </div>
                </div>
              ))}
              {champion && (
                <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:6 }}>
                  <span>🏆</span>
                  <span style={{ fontWeight:900, color:"#f59e0b" }}>{champion.flag} {champion.name}</span>
                </div>
              )}
            </div>

            {/* GROUPS VIEW */}
            {tab === "groups" && (
              <div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(255px,1fr))", gap:12 }}>
                  {Object.entries(groups).map(([id, group]) => (
                    <GroupCard key={id} gid={id} group={group} onResult={setResult} dark={dark} />
                  ))}
                </div>
                <div style={{ marginTop:16, padding:"18px", borderRadius:14, textAlign:"center", background:dark?"#080e1c":"#fff", border:`1px solid ${dark?"#1a2840":"#e2e8f0"}` }}>
                  <p style={{ fontSize:12, color:dark?"#4b5563":"#94a3b8", marginBottom:10 }}>Enter match results, then generate the knockout bracket.</p>
                  <p style={{ fontSize:11, color:dark?"#374151":"#94a3b8", marginBottom:14 }}>ⓘ Top 2 per group + 8 best 3rd-place = 32 qualifiers</p>
                  <div style={{ display:"flex", gap:10, justifyContent:"center", flexWrap:"wrap" }}>
                    <button onClick={randomize} style={{ padding:"9px 18px", borderRadius:9, fontWeight:700, fontSize:12, cursor:"pointer", background:"rgba(59,130,246,0.1)", border:"1px solid rgba(59,130,246,0.25)", color:"#60a5fa" }}>🎲 Auto-Fill Random</button>
                    <button onClick={genBracket} style={{ padding:"9px 22px", borderRadius:9, fontWeight:900, fontSize:12, cursor:"pointer", background:"linear-gradient(90deg,#f59e0b,#eab308)", border:"none", color:"#000", boxShadow:"0 4px 14px rgba(245,158,11,0.35)" }}>⚡ Generate Knockout Bracket →</button>
                  </div>
                </div>
              </div>
            )}

            {/* BRACKET VIEW */}
            {tab === "bracket" && (
              <div>
                <ChampionBanner champion={champion} dark={dark} />
                <div style={{ borderRadius:14, border:`1px solid ${dark?"#1a2840":"#e2e8f0"}`, overflow:"hidden", background:dark?"#080e1c":"#fff" }}>
                  <div style={{ padding:"10px 16px", borderBottom:`1px solid ${dark?"#121e30":"#f1f5f9"}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                    <p style={{ fontSize:9, textTransform:"uppercase", letterSpacing:"0.2em", fontWeight:900, color:dark?"#374151":"#94a3b8", margin:0 }}>Knockout Bracket — Click a team to advance</p>
                    <button onClick={genBracket} style={{ fontSize:10, padding:"3px 10px", borderRadius:7, fontWeight:700, cursor:"pointer", background:"rgba(245,158,11,0.1)", border:"1px solid rgba(245,158,11,0.25)", color:"#fbbf24" }}>↻ Regenerate</button>
                  </div>
                  <div style={{ padding:14 }}>
                    <BracketView bracket={bracket} onAdvance={advance} dark={dark} />
                  </div>
                </div>
                {!champion && <p style={{ textAlign:"center", fontSize:11, marginTop:10, color:dark?"#374151":"#94a3b8" }}>☝️ Click any team to advance them to the next round</p>}
              </div>
            )}
          </main>

          <footer style={{ textAlign:"center", padding:"16px", marginTop:32, fontSize:11, borderTop:`1px solid ${dark?"#0c1422":"#e2e8f0"}`, color:dark?"#374151":"#94a3b8" }}>
            ⚽ FIFA World Cup 2026 · USA · Canada · Mexico · 48 Teams · 12 Groups
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
